app = 'threelab'
primary_region = 'iad'

[build]

[env]
  THREELAB_PORT = '8080'
  THREELAB_STATIC_DIR = '/app/static'
  THREELAB_DB_NAME = 'threelab'
  THREELAB_FRONTEND_URL = 'https://threelab.metavert.io'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
